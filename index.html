<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من أصل سوداني - النسخة الملكية المطورة</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --deep-black: #0a0a0a;
            --pure-white: #ffffff;
        }
        body {
            background-color: var(--deep-black);
            color: var(--pure-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 2px solid var(--primary-gold);
            padding: 20px;
            border-radius: 15px;
            background: linear-gradient(145deg, #1a1a1a, #000000);
        }
        h1 { color: var(--primary-gold); margin-bottom: 10px; }
        .upload-section { margin: 20px 0; }
        input[type="file"] { display: none; }
        .custom-file-upload {
            border: 1px solid var(--primary-gold);
            display: inline-block;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 50px;
            background-color: transparent;
            color: var(--primary-gold);
            transition: 0.3s;
        }
        .custom-file-upload:hover {
            background-color: var(--primary-gold);
            color: black;
        }
        #preview-container {
            margin-top: 20px;
            display: none;
        }
        #user-image {
            width: 100%;
            max-width: 300px;
            border-radius: 10px;
            border: 3px solid var(--primary-gold);
            margin-bottom: 15px;
        }
        .analysis-box {
            background: rgba(212, 175, 55, 0.1);
            border-left: 5px solid var(--primary-gold);
            padding: 15px;
            margin-top: 20px;
            text-align: right;
            display: none;
        }
        .loading {
            display: none;
            color: var(--primary-gold);
            font-style: italic;
            margin: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>من أصل سوداني 🇸🇩</h1>
    <p>تحليل الملامح الملكية بالذكاء الاصطناعي</p>

    <div class="upload-section">
        <label for="imageUpload" class="custom-file-upload">
            اختر صورتك للتحليل
        </label>
        <input type="file" id="imageUpload" accept="image/*">
    </div>

    <div id="loading" class="loading">جاري قراءة الملامح السودانية الأصيلة...</div>

    <div id="preview-container">
        <img id="user-image" src="#" alt="صورتك">
        <div id="result" class="analysis-box"></div>
    </div>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const userImage = document.getElementById('user-image');
    const previewContainer = document.getElementById('preview-container');
    const resultBox = document.getElementById('result');
    const loading = document.getElementById('loading');

    imageUpload.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            loading.style.display = 'block';
            resultBox.style.display = 'none';
            previewContainer.style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(e) {
                setTimeout(() => {
                    loading.style.display = 'none';
                    userImage.src = e.target.result;
                    previewContainer.style.display = 'block';
                    
                    // محاكاة تحليل الجنس والملامح
                    const isMale = Math.random() > 0.5; // هنا يتم الربط بمحرك التعرف مستقبلاً
                    generateAnalysis(isMale);
                }, 2000);
            }
            reader.readAsDataURL(file);
        }
    });

    function generateAnalysis(isMale) {
        let title = isMale ? "التحليل للذكر:" : "التحليل للأنثى:";
        let genderTone = isMale ? "ملامح رجولية سودانية تمتاز بالهيبة والشموخ." : "ملامح أنثوية سودانية أصيلة تمتاز بالرقة والوقار.";
        let traits = isMale ? 
            "العينان تعكسان حكمة أهل النيل، وتدرج البشرة يدل على أصالة الجذور." : 
            "تقاسيم الوجه تعكس جمال الملكات الكوشيات، مع إشراقة سودانية مميزة.";

        resultBox.innerHTML = `
            <h3 style="color: #d4af37; margin-top: 0;">${title}</h3>
            <p><strong>النوع:</strong> ${isMale ? "ذكر" : "أنثى"}</p>
            <p><strong>وصف الشخصية:</strong> ${genderTone}</p>
            <p><strong>ملاحظة الذكاء:</strong> ${traits}</p>
            <p style="font-size: 0.8em; color: #aaa;">نعتز بهويتنا السودانية 🇸🇩</p>
        `;
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
